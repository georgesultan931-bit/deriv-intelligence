services:
  - type: web
    name: deriv-intelligence-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: deriv-intelligence-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: DERIV_APP_ID
        sync: false
      - key: DERIV_API_TOKEN
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USE_TLS
        value: true
      - key: EMAIL_HOST_USER
        value: georgesultan931@gmail.com
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: georgesultan931@gmail.com

  - type: web
    name: deriv-intelligence-web
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_WS_URL
        sync: false

databases:
  - name: deriv-intelligence-db
    databaseName: deriv_intelligence
    user: deriv
